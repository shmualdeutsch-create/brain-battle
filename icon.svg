<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>סמל קרב מוחות</title>
<desc>סצנת אצטדיון חשוך עם קורות אור וזרקורים, במה עגולה זוהרת במרכז, והכיתוב הניאון "קרב מוחות" בגרדיאנט ורוד-ציאן זוהר באמצע</desc>
<defs>
<radialGradient id="stageGlow" cx="50%" cy="52%" r="75%">
<stop offset="0%" stop-color="#2b2166"/>
<stop offset="45%" stop-color="#12102a"/>
<stop offset="100%" stop-color="#020204"/>
</radialGradient>
<linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#334155"/>
<stop offset="100%" stop-color="#0f172a"/>
</linearGradient>
<linearGradient id="textGrad2" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#f9a8d4"/>
<stop offset="100%" stop-color="#22d3ee"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="680" height="400" fill="url(#stageGlow)"/>

<polygon points="0,400 130,400 280,55 215,55" fill="#ffffff" opacity="0.05"/>
<polygon points="680,400 550,400 400,55 465,55" fill="#ffffff" opacity="0.05"/>
<polygon points="230,400 300,400 355,45 300,45" fill="#22d3ee" opacity="0.05"/>
<polygon points="450,400 380,400 325,45 380,45" fill="#f472b6" opacity="0.05"/>

<polygon points="0,400 0,300 90,340 40,400" fill="#05070f" opacity="0.75"/>
<polygon points="680,400 680,300 590,340 640,400" fill="#05070f" opacity="0.75"/>

<circle cx="95" cy="315" r="3" fill="#fde68a" opacity="0.7"/>
<circle cx="60" cy="345" r="3" fill="#fde68a" opacity="0.6"/>
<circle cx="130" cy="360" r="3" fill="#fde68a" opacity="0.6"/>
<circle cx="585" cy="315" r="3" fill="#fde68a" opacity="0.7"/>
<circle cx="620" cy="345" r="3" fill="#fde68a" opacity="0.6"/>
<circle cx="550" cy="360" r="3" fill="#fde68a" opacity="0.6"/>

<circle cx="150" cy="58" r="9" fill="#fff8e1" opacity="0.15"/>
<circle cx="150" cy="58" r="4" fill="#fff8e1" opacity="0.9"/>
<circle cx="340" cy="42" r="10" fill="#fff8e1" opacity="0.15"/>
<circle cx="340" cy="42" r="4.5" fill="#fff8e1" opacity="0.9"/>
<circle cx="530" cy="58" r="9" fill="#fff8e1" opacity="0.15"/>
<circle cx="530" cy="58" r="4" fill="#fff8e1" opacity="0.9"/>

<ellipse cx="340" cy="392" rx="290" ry="38" fill="url(#floorGrad)"/>
<ellipse cx="340" cy="392" rx="290" ry="38" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
<ellipse cx="340" cy="392" rx="180" ry="22" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.3"/>

<circle cx="340" cy="225" r="150" fill="#f472b6" opacity="0.06"/>
<circle cx="340" cy="225" r="100" fill="#22d3ee" opacity="0.08"/>

<text x="340" y="245" text-anchor="middle" font-size="92" font-weight="700" font-family="Arial, sans-serif" fill="none" stroke="#22d3ee" stroke-width="20" opacity="0.15" style="letter-spacing:1px">קרב מוחות</text>
<text x="340" y="245" text-anchor="middle" font-size="92" font-weight="700" font-family="Arial, sans-serif" fill="none" stroke="#f472b6" stroke-width="10" opacity="0.3" style="letter-spacing:1px">קרב מוחות</text>
<text x="340" y="245" text-anchor="middle" font-size="92" font-weight="700" font-family="Arial, sans-serif" fill="url(#textGrad2)" stroke="#0b0a1f" stroke-width="4" paint-order="stroke" style="letter-spacing:1px">קרב מוחות</text>

<text x="340" y="290" text-anchor="middle" font-size="24" font-weight="500" font-family="Arial, sans-serif" fill="#a5f3fc" stroke="#0b0a1f" stroke-width="4" paint-order="stroke">מי המוח שינצח?</text>

</svg>
