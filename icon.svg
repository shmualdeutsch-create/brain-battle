<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>סמל קרב מוחות</title>
<desc>שני ראשי חייזר כהים מול מול עם ויזור זוהר בציאן, על רקע כרית סגולה מלאה בכוכבים, עם הכיתוב "קרב מוחות" בגרדיאנט ורוד-ציאן בתחתית</desc>
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#5b21b6"/>
<stop offset="100%" stop-color="#1e1b4b"/>
</linearGradient>
<linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1e2a5e"/>
<stop offset="100%" stop-color="#0d1229"/>
</linearGradient>
<linearGradient id="visorGrad" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#a5f3fc"/>
<stop offset="100%" stop-color="#0891b2"/>
</linearGradient>
<linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#f9a8d4"/>
<stop offset="100%" stop-color="#22d3ee"/>
</linearGradient>
<g id="star">
<path d="M0,-9 L2.5,-2.5 L9,0 L2.5,2.5 L0,9 L-2.5,2.5 L-9,0 L-2.5,-2.5 Z" fill="#e9d5ff"/>
</g>
<g id="head">
<ellipse cx="255" cy="260" rx="65" ry="80" fill="url(#headGrad)" stroke="#3730a3" stroke-width="2"/>
<polygon points="195,185 165,145 225,205" fill="#1e2a5e" stroke="#3730a3" stroke-width="2"/>
<polygon points="215,325 300,300 260,365" fill="#1e2a5e"/>
<polygon points="205,300 295,290 265,340" fill="#1e2a5e"/>
<rect x="280" y="240" width="58" height="28" rx="14" fill="url(#visorGrad)"/>
<circle cx="210" cy="225" r="6" fill="#67e8f9" opacity="0.7"/>
</g>
</defs>

<rect x="30" y="30" width="620" height="620" rx="140" fill="url(#bgGrad)"/>

<use href="#star" transform="translate(95,95) scale(1.3)" opacity="0.7"/>
<use href="#star" transform="translate(585,100) scale(0.9)" opacity="0.5"/>
<use href="#star" transform="translate(340,65) scale(0.7)" opacity="0.6"/>
<use href="#star" transform="translate(600,300) scale(1.1)" opacity="0.4"/>
<use href="#star" transform="translate(85,320) scale(1.1)" opacity="0.4"/>
<use href="#star" transform="translate(120,470) scale(0.8)" opacity="0.5"/>
<use href="#star" transform="translate(575,470) scale(0.8)" opacity="0.5"/>
<use href="#star" transform="translate(230,110) scale(0.6)" opacity="0.5"/>
<use href="#star" transform="translate(460,110) scale(0.6)" opacity="0.5"/>

<circle cx="340" cy="255" r="175" fill="#f472b6" opacity="0.05"/>
<circle cx="340" cy="255" r="120" fill="#22d3ee" opacity="0.08"/>

<rect x="115" y="150" width="450" height="270" rx="135" fill="none" stroke="url(#textGrad)" stroke-width="3" opacity="0.6"/>

<use href="#head"/>
<use href="#head" transform="translate(680,0) scale(-1,1)"/>

<text x="340" y="518" text-anchor="middle" font-size="84" font-weight="700" font-family="Arial, sans-serif" fill="url(#textGrad)" stroke="#1e1b4b" stroke-width="9" paint-order="stroke" style="letter-spacing:1px">קרב מוחות</text>

<text x="340" y="565" text-anchor="middle" font-size="26" font-weight="500" font-family="Arial, sans-serif" fill="#67e8f9" stroke="#1e1b4b" stroke-width="4" paint-order="stroke">מי המוח שינצח?</text>

</svg>
